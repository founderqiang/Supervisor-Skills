name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Skill structure lint
        run: python scripts/lint_skills.py
      - name: Shared-reference sync check
        run: python scripts/check_shared_sync.py
